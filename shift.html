<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .container { width: 100%; max-width: 500px; margin: 0 auto; }
        
        /* Ye class button ko bada aur saaf dikhayegi */
        .shift-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            text-align: center;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            text-decoration: none;
            color: black;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px; /* Text ka size bada kar diya */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>SELECT YOUR SHIFT</h2>
        
        <a href="#" class="shift-btn">DAY SHIFT</a>
        <a href="#" class="shift-btn">NIGHT SHIFT</a>
        <a href="#" class="shift-btn">FLEXIBLE SHIFT</a>
    </div>

</body>
</html>
